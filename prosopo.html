        { settlements: ["Άγιος Βασίλειος", "Άγιος Γεώργιος", "Ανατολή", "Ανώγεια", "Βραχάσι", "Βρύσες", "Κελλάρια", "Μάρθα", "Παλαιοχώρα", "Σάσαλος", "Σέλλες", "Σιρίλι", "Τύλισος"], words: ["η μούρη"] },
        { settlements: ["Άγιος Βασίλειος", "Βουλγάρω", "Θεοδώρα", "Κελλάρια", "Μάρθα", "Παλαιοχώρα", "Σέλλες"], words: ["τα μούτρα"] },
        { settlements: ["Αγία Άννα", "Άγιος Δημήτριος (Ηλείας)", "Αλποχώρι", "Αμπελιώνα", "Βαλύρα", "Βεργαδαίικα", "Βρέσθενα", "Γυμνό", "Δολιανά", "Κανδήλα", "Καρυά", "Καστρί", "Κάτω Λουσοί", "Λεβίδι", "Λεχαινά", "Λυγουριό", "Μαγούλα", "Πάκια", "Παραδείσια", "Πηγαδάκια", "Προάστιο", "Ροεινό", "Ρούτσι", "Σαρακίνι", "Στεμνίτσα", "Τρόπαια", "Τσέρια", "Φενεός"], words: ["το πρόσωπο"] },
        { settlements: ["Βεργαδαίικα", "Βρέσθενα", "Δολιανά", "Δροσοπηγή", "Κανδήλα", "Προάστιο", "Ρούτσι", "Σκεπαστό", "Τρόπαια", "Τσέρια"], words: ["η μούρη"] },
        { settlements: ["Βρέσθενα", "Δροσοπηγή", "Καρυά", "Μυγδαλιά", "Προάστιο"], words: ["η φάτσα"] },
        { settlements: ["Αμπελιώνα", "Βρέσθενα", "Κρέστενα"], words: ["η μουτσούνα"] },
        { settlements: ["Αλποχώρι", "Κανδήλα", "Μυγδαλιά"], words: ["το μούτρο"] },
        { settlements: ["Αγία Άννα", "Άγιος Δημήτριος (Ηλείας)", "Αγρίδι", "Αλποχώρι", "Αμπελιώνα", "Βαλύρα", "Βεργαδαίικα", "Βρέσθενα", "Γυμνό", "Δολιανά", "Δροσοπηγή", "Ελάτη", "Καλούσι", "Κανδήλα", "Καρυά", "Κάτω Λουσοί", "Κρέστενα", "Λεβίδι", "Μυγδαλιά", "Νεοχώρι", "Πιάνα", "Προάστιο", "Ρούτσι", "Σαρακίνι", "Σκεπαστό", "Σπαρτιά", "Τρόπαια", "Τσέρια", "Φενεός"], words: ["τα μούτρα"] },
        { settlements: ["Πέρα Μέλανα", "Πραστός"], words: ["το μούτσουνε"] },
        { settlements: ["Άγιος Δημήτριος (Ζακύνθου)", "Ασπρογερακάτα", "Βαθύ", "Ζάκυνθος", "Καλιπάδο", "Καρδακάτα", "Ληξούρι", "Μαχαιράδο", "Μονοπολάτα", "Πάγοι", "Σκινέας", "Φισκάρδο"], words: ["το πρόσωπο"] },
        { settlements: ["Ζάκυνθος", "Ληξούρι", "Νησάκι"], words: ["η μούρη"] },
        { settlements: ["Αργυράδες", "Αρμενάδες", "Βάτος", "Ζάκυνθος", "Κέρκυρα", "Νησάκι", "Πάγοι", "Σκριπερό"], words: ["το μούτρο"] },

        { settlements: ["Ζάκυνθος", "Κατούνα", "Νησάκι"], words: ["η φάτσα"] },
        { settlements: ["Ζάκυνθος"], words: ["το μούζο", "η μουτσούνα"] },
        { settlements: ["Γαστριά*", "Καραβάς*", "Λάπηθος*", "Μουτουλλάς", "Νέο Χωριό", "Πάνω Λεύκαρα"], words: ["το πρόσωπον"] },
        { settlements: ["Πάνω Λεύκαρα"], words: ["το μούτρον"] },
        { settlements: ["Έμπα", "Νέο Χωριό", "Πάνω Λεύκαρα"], words: ["τα μούτρα"] },
        { settlements: ["Λάπηθος*", "Μια Μηλιά*"], words: ["η μουτσούνα"] }
    ];

    // Ομαδοποίηση των δεδομένων ανά οικισμό
    var settlementData = {};
    wordMappings.forEach(function(mapping) {
        mapping.settlements.forEach(function(settlementName) {
            if (!settlementData[settlementName]) {
                settlementData[settlementName] = [];
            }
            mapping.words.forEach(function(word) {
                if (!settlementData[settlementName].includes(word)) {
                    settlementData[settlementName].push(word);
                }
            });
        });
    });

    // Συνάρτηση σχεδιασμού οικισμών
    for (var settlementName in settlementData) {
        if (locations[settlementName]) {
            var lat = locations[settlementName].lat;
            var lon = locations[settlementName].lon;
            var wordsArray = settlementData[settlementName];
            
            // Μαύρος κύκλος οικισμού με ακτίνα 3 pixel
            var marker = L.circleMarker([lat, lon], {
                radius: 3,
                fillColor: "black",
                color: "black",
                weight: 1,
                opacity: 1,
                fillOpacity: 1
            }).addTo(map);

            // Μόνιμο όνομα οικισμού
            marker.bindTooltip(settlementName, {
                permanent: true,
                direction: 'top',
                offset: [0, -5],
                className: 'settlement-tooltip'
            });

            // Κατασκευή κειμένου: Ιστορική Ορθογραφία - IPA (χωρίς αγκύλες)
            var wordsHTML = "";
            wordsArray.forEach(function(word) {
                var color = colors[word] || "#000000";
                var ipaStr = ipaTranslation[word] ? " - " + ipaTranslation[word] : "";
                wordsHTML += '<span style="color: ' + color + ';">' + word + ipaStr + '</span><br>';
            });

            // Εμφάνιση μόνιμου κειμένου λέξεων
            var wordIcon = L.divIcon({
                className: 'word-label',
                html: wordsHTML,
                iconSize: [220, null], 
                iconAnchor: [-8, 10]
            });

            L.marker([lat, lon], {icon: wordIcon}).addTo(map);
        }
    }

    // Προσθήκη Λεζάντας
    var legend = L.control({position: 'bottomright'});
    legend.onAdd = function (map) {
        var div = L.DomUtil.create('div', 'custom-legend');
        div.innerHTML = 'γλωσσογεωγραφικά<br><b>Δημήτρη Λιθοξόου</b><br>face πρόσωπο';
        return div;
    };
    legend.addTo(map);

</script>
