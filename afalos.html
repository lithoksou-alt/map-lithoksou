<!DOCTYPE html>
<html lang="el">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Γλωσσογεωγραφικός Άτλας: αφαλός</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background-color: #ebe6dd; }
        #map { width: 100vw; height: 100vh; background-color: #ebe6dd; }
        
        .word-label { 
            font-family: 'Verdana', sans-serif; 
            background: transparent; 
            border: none; 
            box-shadow: none; 
            font-size: 11px; 
            line-height: 1.2; 
            text-align: center; 
            white-space: nowrap; 
        }
        
        .settlement-tooltip { 
            font-family: 'Verdana', sans-serif; 
            background: transparent; 
            border: none; 
            box-shadow: none; 
            color: #4a4a4a; 
            font-weight: bold; 
            font-size: 10px; 
            text-shadow: 1px 1px 2px white, -1px -1px 2px white; 
        }
        .leaflet-tooltip-top:before { display: none; }
        
        .custom-legend { font-family: 'Verdana', sans-serif; background-color: rgba(255, 255, 255, 0.95); padding: 8px 10px; border-radius: 5px; font-size: 11px; border: 1px solid #ccc; line-height: 1.4; max-height: 92vh; overflow-y: auto; max-width: 240px; position: relative; }
        .legend-toggle { float: right; cursor: pointer; font-weight: bold; color: #555; margin-left: 10px; font-size: 12px; user-select: none; }
        .legend-content { margin-top: 5px; }
        
        .export-button {
            position: absolute;
            top: 80px; 
            left: 10px;
            z-index: 1000;
            background: white;
            border: 2px solid rgba(0,0,0,0.2);
            border-radius: 4px;
            padding: 6px 10px;
            cursor: pointer;
            font-family: 'Verdana', sans-serif;
            font-size: 11px;
            font-weight: bold;
            color: #333;
            box-shadow: 0 1px 5px rgba(0,0,0,0.4);
        }
        .export-button:hover { background: #f4f4f4; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dom-to-image/2.6.0/dom-to-image.min.js"></script>
</head>

        };

        var colors = {
            "ο αφαλός": "#fd8d3c", "ου αφαλός": "#e31a1c", "ι αφαλός": "#bd0026",
            "το αφάλ": "#feb24c", "το αφάλι": "#fc4e2a", "ο αφαλντός": "#e31a1c",
            "ο απαλέ": "#fdbf6f", "το ασαγάλι": "#1d91c0",
            "το κοιλίδι": "#41ab5d", "ου νιφαλός": "#fe9929", "ου νουφαλός": "#ec7014",
            "ι νουφαλός": "#fdbf6f", "ο οφαλός": "#800026", "το φάλι": "#662506",
            "το αρφάλιν": "#993404"
        };

        var ipaTranslation = {
            "ο αφαλός": "o afaˈlos", "ου αφαλός": "u afaˈlos", "ι αφαλός": "i afaˈlos",
            "το αφάλ": "to aˈfal", "το αφάλι": "to aˈfali", "ο αφαλντός": "o falˈdos",
            "ο απαλέ": "o apaˈle", "το ασαγάλι": "to asaˈɣali",
            "το κοιλίδι": "to ciˈliði", "ου νιφαλός": "u nifaˈlos", "ου νουφαλός": "u nufaˈlos",
            "ι νουφαλός": "i nufaˈlos", "ο οφαλός": "o ofaˈlos", "το φάλι": "to ˈfali",
            "το αρφάλιν": "to arˈfalin"
        };

            { words: ["ο απαλέ"], settlements: ["Πέρα Μέλανα"] },

            { words: ["το αρφάλιν"], settlements: ["Άγιος Νικόλαος*", "Καραβάς*", "Μουτουλλάς", "Νέο Χωριό"] },

            { words: ["το αφάλι"], settlements: ["Άγιος Δημήτριος Ζακύνθου", "Άγιος Δημήτριος Ηλείας", "Αλποχώρι", "Απείραθος", "Αργοστόλι", "Αρμενάδες", "Βαλύρα", "Βεργαδαίικα", "Ζάκυνθος", "Καρδακάτα", "Κίμωλος", "Κορωνίδα", "Κρέστενα", "Ληξούρι", "Μαγούλα", "Μάλη", "Μαχαιράδο", "Μονοπολάτα", "Νεοχωριό", "Νησάκι", "Πάγοι", "Πέρα Μέλανα", "Πιάνα", "Προάστιο", "Πύργος", "Σκεπαστό", "Σκινέας", "Σκριπερό", "Σπαρτιά", "Τριοβάσαλος", "Τσέρια", "Τυρός"] },
            { words: ["ο αφαλντός"], settlements: ["Φολέγανδρος"] },
            { words: ["ου αφαλός"], settlements: ["Άγιος", "Άγιος Νικόλαος", "Βουρλιώτες", "Βράχα", "Γουριά", "Γραμματικού", "Δραμεσιοί", "Καρίτσα", "Κιλελέρ", "Λιλαία", "Μακρινή", "Μακρολίβαδο", "Μελισσουργοί", "Μεσούντα", "Πλατύστομο", "Ραψάνη", "Σιάτιστα", "Στροφυλιά", "Στυλίδα", "Τιθορέα", "Τσουκαλάδες", "Χουλιαράδες", "Χρυσοβίτσα"] },
            { words: ["ο αφαλός"], settlements: ["Αγία Άννα", "Άγιος Δημήτριος Ηλείας", "Αγρίδι", "Αμπελιώνα", "Άνω Σύρος", "Απολλωνία", "Αργοστόλι", "Αρχαία Φενεός", "Βρέσθενα", "Γάιος", "Γυμνό", "Δελβινάκι", "Δολιανά", "Δροσοπηγή", "Δρυμώνας", "Ερεικούσα", "Ερμούπολη", "Ζάκυνθος", "Θαρούνια", "Κανδήλα", "Καρδακάτα", "Καρυά", "Κάτω Λουσοί", "Κίμωλος", "Κύθνος", "Λιβάδια", "Λυγουριό", "Μέγαρα", "Μυγδαλιά", "Πάκια", "Παραδείσια", "Πηγαδάκια", "Πύργος", "Ροεινό", "Ροζενά", "Ρούτσι", "Τριοβάσαλος", "Τσαμαντάς", "Φενεός", "Ωραιόκαστρο"] },

            { words: ["ι νουφαλός"], settlements: ["Αγιά"] },
            { words: ["ο οφαλός"], settlements: ["Δολό", "Εμπρόσνερος", "Παλαιοχώρα"] },
            { words: ["το φάλι"], settlements: ["Άγιος Γεώργιος", "Ανατολή", "Βρύσες", "Θεοδώρα", "Μάρθα", "Μιαμού", "Τύλισος"] }
        ];

        var settlementData = {};
        wordMappings.forEach(function(mapping) {
            mapping.settlements.forEach(function(settlementName) {
                if (!settlementData[settlementName]) { settlementData[settlementName] = []; }
                mapping.words.forEach(function(word) {
                    if (!settlementData[settlementName].includes(word)) { settlementData[settlementName].push(word); }
                });
            });
        });

        // Σχεδιασμός
        for (var settlementName in settlementData) {
            if (locations[settlementName]) {
                var lat = locations[settlementName].lat;
                var lon = locations[settlementName].lon;
                var wordsArray = settlementData[settlementName];
                
                L.circleMarker([lat, lon], { radius: 4, fillColor: "#999999", color: "#999999", weight: 1, fillOpacity: 1 }).addTo(settlementsLayer)
                 .bindTooltip(settlementName, { permanent: true, direction: 'top', offset: [0, -5], className: 'settlement-tooltip' });

                var wordsHTML = '<div style="text-align: center; line-height: 1.2;">';
                wordsArray.forEach(function(word) {
                    var color = colors[word] || "#000000";
                    var ipaStr = ipaTranslation[word] ? ipaTranslation[word] : "";
                    var shadow = "-1px -1px 0 #ffffff, 0 -1px 0 #ffffff, 1px -1px 0 #ffffff, -1px 0 0 #ffffff, 1px 0 0 #ffffff, -1px 1px 0 #ffffff, 0 1px 0 #ffffff, 1px 1px 0 #ffffff";
                    
                    wordsHTML += '<span style="color: ' + color + '; text-shadow: ' + shadow + '; display: block; font-weight: bold; font-style: italic;">' + word + '</span>';
                    if (ipaStr) wordsHTML += '<span style="color: ' + color + '; text-shadow: ' + shadow + '; display: block; font-size: 11px; font-weight: bold; font-style: normal; margin-top: 1px; opacity: 0.95;">' + ipaStr + '</span>';
                });
                wordsHTML += '</div>';
                L.marker([lat, lon], { icon: L.divIcon({ className: 'word-label', html: wordsHTML, iconSize: [200, null], iconAnchor: [100, -8] }) }).addTo(wordsLayer);
            }
        }

        var overlays = { "Settlements": settlementsLayer, "Variants": wordsLayer };
        L.control.layers(null, overlays, { collapsed: false }).addTo(map);

        var legend = L.control({position: 'bottomright'});
        legend.onAdd = function (map) {
            var div = L.DomUtil.create('div', 'custom-legend');
            div.innerHTML = '<span class="legend-toggle" id="legendToggle" onclick="toggleLegend()">[-]</span>' +
                            '<div style="text-align: center; font-weight: bold; font-size:11px;">linguistic atlas<br>Dhimitris Lithoksou</div>' +
                            '<div class="legend-content" id="legendContent">' +
                            '<div style="text-align: center; margin-bottom:10px; font-size:11px;">the navel ο αφαλός o afaˈlos</div></div>';
            var contentDiv = div.querySelector('#legendContent');
            var groupedColors = {};
            for (var word in colors) {
                var hex = colors[word];
                if (!groupedColors[hex]) groupedColors[hex] = [];
                groupedColors[hex].push(word + (ipaTranslation[word] ? " (" + ipaTranslation[word] + ")" : ""));
            }
            for (var hex in groupedColors) {
                contentDiv.innerHTML += '<div style="margin-bottom: 2px; text-align: left;"><i style="background:' + hex + '; width:11px; height:11px; display:inline-block; margin-right:5px; border:1px solid #000; vertical-align: middle;"></i>' + groupedColors[hex].join(', ') + '</div>';
            }
            return div;
        };
        legend.addTo(map);

        function toggleLegend() {
            var content = document.getElementById('legendContent');
            var toggle = document.getElementById('legendToggle');
            if (content.style.display === 'none') { content.style.display = 'block'; toggle.innerHTML = '[-]'; }
            else { content.style.display = 'none'; toggle.innerHTML = '[+]'; }
        }

        function exportMapAsImage() {
            var mapElement = document.getElementById('map');
            domtoimage.toPng(mapElement, { width: mapElement.clientWidth, height: mapElement.clientHeight })
            .then(function (dataUrl) {
                var link = document.createElement('a');
                link.download = 'atlas_export.png';
                link.href = dataUrl;
                link.click();
            })
            .catch(function (error) { alert('Σφάλμα κατά την εξαγωγή: ' + error); });
        }
    </script>
