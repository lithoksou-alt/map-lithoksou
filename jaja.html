        { settlements: ["Πηγή"], words: ["η κυραμάνα"] },
        { settlements: ["Αμπελιώνα", "Βρέσθενα", "Δολιανά", "Καστρί", "Ρούτσι", "Σκεπαστό"], words: ["η κυρούλα"] },
        { settlements: ["Άγιος Γεώργιος", "Ανατολή", "Ανάφη", "Ανώγεια", "Άνω Σύρος", "Απείραθος", "Αποδούλου", "Απολλωνία", "Βραχάσι", "Κίμωλος", "Κορωνίδα", "Κύθνος", "Πύργος", "Σέλλες", "Τύλισος", "Φολέγανδρος"], words: ["η λαλά"] },
        { settlements: ["Απείραθος"], words: ["οι λαλάδες"] },
        { settlements: ["Εμπρόσνερος", "Σάσαλος", "Σιρίλι"], words: ["η λάλη"] },
        { settlements: ["Δελβινάκι", "Δολό", "Σταυροδρόμι", "Ωραιόκαστρο"], words: ["η μάλε (η μάνα του πατέρα)"] },
        { settlements: ["Τσαμαντάς"], words: ["η μαλέκω"] },
        { settlements: ["Σιάτιστα"], words: ["η μαμάνα"] },
        { settlements: ["Θαρούνια", "Μέγαρα"], words: ["η μαμή"] },
        { settlements: ["Πέρα Μέλανα", "Τυρός"], words: ["α μαμού"] },
        { settlements: ["Νέο Χωριό"], words: ["η μαμμού"] },
        { settlements: ["Αγρίδι"], words: ["η μανακαλή"] },
        { settlements: ["Τιθορέα"], words: ["η μανάκου"] },
        { settlements: ["Αγιά", "Κανάλια", "Καρίτσα", "Μασχολούρι", "Μηλίνα", "Ραψάνη", "Σιάτιστα", "Σταγιάδες"], words: ["η μανιά"] },
        { settlements: ["Δελβινάκι", "Έλατος", "Χρυσή"], words: ["η μανίτσα"] },
        { settlements: ["Άγιος Γεώργιος"], words: ["η μεγάλη"] },
        { settlements: ["Έλατος"], words: ["η μπαμπίτσα (μάνα της μάνας)"] },
        { settlements: ["Γέρμας", "Έλατος", "Πλατύστομο", "Σταγιάδες"], words: ["η μπάμπου"] },
        { settlements: ["Δελβινάκι", "Δροσοπηγή", "Κρέστενα", "Πηγή"], words: ["η μπάμπω"] },
        { settlements: ["Λιλαία"], words: ["η νάνα"] },
        { settlements: ["Αμπελιώνα", "Άνω Σύρος"], words: ["η νενέ"] },
        { settlements: ["Κουμαρίτσι"], words: ["η νινά"] },
        { settlements: ["Βουρλιώτες", "Σιάτιστα"], words: ["η νινέ"] },
        { settlements: ["Σιάτιστα"], words: ["η νινιέ"] },
        { settlements: ["Αγρίδι", "Άγιος Δημήτριος (Ηλείας)", "Άγιος Δημήτριος (Ζακύνθου)", "Αργοστόλι", "Βαθύ", "Γάιος", "Ζάκυνθος", "Καλιπάδο", "Καρδακάτα", "Κέρκυρα", "Κρέστενα", "Λαγκάδια", "Λεχαινά", "Ληξούρι", "Μονοπολάτα", "Πάργα", "Σκεπαστό", "Σκινέας", "Στεμνίτσα", "Φισκάρδο", "Φολέγανδρος"], words: ["η νόνα"] },
        { settlements: ["Γάιος"], words: ["η νούνα"] },
        { settlements: ["Άγιος Νικόλαος*", "Έμπα", "Μουτουλλάς", "Πάνω Λεύκαρα"], words: ["η στετέ"] },
        { settlements: ["Λαγκάδια"], words: ["η τάτα"] },
        { settlements: ["Λαγκάδια", "Τρόπαια"], words: ["η τρανή"] },
        { settlements: ["Λαγκάδια"], words: ["η τρανήκω"] },
        { settlements: ["Λαγκάδια"], words: ["η τσάτσω"] },
        { settlements: ["Κύθνος"], words: ["η τσουρά"] },
        { settlements: ["Τσέρια"], words: ["η τσυρά"] },
        { settlements: ["Κανδήλα", "Στεμνίτσα"], words: ["η τσυρούλα"] }
    ];

    // Ομαδοποίηση των δεδομένων ανά οικισμό
    var settlementData = {};
    wordMappings.forEach(function(mapping) {
        mapping.settlements.forEach(function(settlementName) {
            if (!settlementData[settlementName]) {
                settlementData[settlementName] = [];
            }
            mapping.words.forEach(function(word) {
                if (!settlementData[settlementName].includes(word)) {
                    settlementData[settlementName].push(word);
                }
            });
        });
    });

    // Συνάρτηση σχεδιασμού οικισμών
    for (var settlementName in settlementData) {
        if (locations[settlementName]) {
            var lat = locations[settlementName].lat;
            var lon = locations[settlementName].lon;
            var wordsArray = settlementData[settlementName];
            
            // Μαύρος κύκλος οικισμού με ακτίνα 3 pixel
            var marker = L.circleMarker([lat, lon], {
                radius: 3,
                fillColor: "black",
                color: "black",
                weight: 1,
                opacity: 1,
                fillOpacity: 1
            }).addTo(map);

            // Μόνιμο όνομα οικισμού
            marker.bindTooltip(settlementName, {
                permanent: true,
                direction: 'top',
                offset: [0, -5],
                className: 'settlement-tooltip'
            });

            // Κατασκευή κειμένου: Ιστορική Ορθογραφία - IPA (χωρίς αγκύλες)
            var wordsHTML = "";
            wordsArray.forEach(function(word) {
                var color = colors[word] || "#000000";
                var ipaStr = ipaTranslation[word] ? " - " + ipaTranslation[word] : "";
                wordsHTML += '<span style="color: ' + color + ';">' + word + ipaStr + '</span><br>';
            });

            // Εμφάνιση μόνιμου κειμένου λέξεων
            var wordIcon = L.divIcon({
                className: 'word-label',
                html: wordsHTML,
                iconSize: [220, null], 
                iconAnchor: [-8, 10]
            });

            L.marker([lat, lon], {icon: wordIcon}).addTo(map);
        }
    }

    // Προσθήκη Λεζάντας
    var legend = L.control({position: 'bottomright'});
    legend.onAdd = function (map) {
        var div = L.DomUtil.create('div', 'custom-legend');
        div.innerHTML = 'γλωσσογεωγραφικά<br><b>Δημήτρη Λιθοξόου</b><br>grandmother γιαγιά';
        return div;
    };
    legend.addTo(map);

</script>
